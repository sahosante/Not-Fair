<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Not Fair</title>

<!-- ── LilitaOne font — CSS ile preload (Phaser'dan önce yüklenir) ── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    -webkit-user-select:none; user-select:none; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  overscroll-behavior:none;       /* prevent pull-to-refresh / rubber-band on Android */
  background:#000;
  touch-action:none;
  font-family:'Lilita One', 'Courier New', monospace;
}

/* ── Font warm-up — tarayıcı LilitaOne'ı render pipeline'a alır ── */
#font-warmup {
  position:fixed; top:-9999px; left:-9999px;
  font-family:'Lilita One', Arial, sans-serif;
  font-size:16px; color:transparent;
  pointer-events:none; user-select:none;
  white-space:nowrap;
}

/* YÜKLEME */
#loading-screen {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:#0a0010;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9998; gap:20px;
}
#loading-screen.hidden { display:none; }
.load-logo {
  font-family:'Lilita One', Arial, sans-serif;
  font-size:28px; color:#ff4400;
  letter-spacing:5px; text-shadow:0 0 20px #ff440088;
}
.load-bar-bg { width:220px; height:7px; background:#220011; border-radius:4px; overflow:hidden; }
.load-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#ff4400,#ff8800); border-radius:4px; transition:width 0.3s ease; }
.load-txt {
  font-family:'Lilita One', Arial, sans-serif;
  font-size:12px; color:#aa5533; letter-spacing:3px;
}

/* OYUN KAPSAYICI */
#game-container {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  visibility:hidden;
  contain:layout style;            /* GPU compositing hint */
  isolation:isolate;               /* own stacking context — prevents repaint bleed */
  will-change:transform;
}
#game-container.active { visibility:visible; }

#game-container > div {
  display:flex !important;
  justify-content:center !important;
  align-items:center !important;
}

#game-container canvas {
  display:block !important;
  margin:0 auto !important;
  touch-action:none;
  image-rendering:auto;
}
</style>
</head>
<body>

<!-- Font warm-up div — tarayıcı LilitaOne'ı DOM'a render eder, cache'ler -->
<div id="font-warmup" aria-hidden="true">
  PLAY SETTINGS HOW TO PLAY LEADERBOARD NOT FAIR LEVEL UP PAUSED RESUME MAIN MENU
  ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!?.,:/-+
</div>

<div id="loading-screen">
  <div class="load-logo">NOT FAIR</div>
  <div class="load-bar-bg"><div class="load-bar-fill" id="load-bar"></div></div>
  <div class="load-txt" id="load-txt">YÜKLENİYOR...</div>
</div>

<div id="game-container"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  // ── Telegram WebApp init ──────────────────────────────────────
  if (window.Telegram && window.Telegram.WebApp) {
    try { Telegram.WebApp.ready(); } catch(e) {}
    try { Telegram.WebApp.expand(); } catch(e) {}
    try { Telegram.WebApp.requestFullscreen(); } catch(e) {}
  }

  // ── Dokunma olaylarını kilitle ────────────────────────────────
  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('touchstart', function(e){ if(e.touches.length > 1) e.preventDefault(); }, { passive:false });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  var bar  = document.getElementById('load-bar');
  var ltxt = document.getElementById('load-txt');

  // ── LilitaOne font yüklenip yüklenmediğini kontrol et ────────
  function _waitFont(cb) {
    if (document.fonts && document.fonts.load) {
      Promise.all([
        document.fonts.load('16px "Lilita One"'),
        document.fonts.load('bold 16px "Lilita One"'),
        document.fonts.load('24px "Lilita One"'),
        document.fonts.load('28px "Lilita One"')
      ]).then(function(){ cb(); }).catch(function(){ cb(); });
    } else {
      // Font API yok — 400ms bekle
      setTimeout(cb, 400);
    }
  }

  // ── Yükleme zinciri: Font → Phaser → main.js ─────────────────
  bar.style.width = '15%';
  ltxt.textContent = 'FONT YÜKLENİYOR...';

  _waitFont(function() {
    bar.style.width = '30%';
    ltxt.textContent = 'YÜKLENİYOR...';

    // Phaser
    var ph = document.createElement('script');
    ph.src = 'https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js';
    ph.onload = function() {
      bar.style.width = '70%';

      // main.js
      var g = document.createElement('script');
      g.src = 'main.js?' + Date.now();
      g.onload = function() {
        bar.style.width = '100%';
        ltxt.textContent = 'HAZIR!';
        setTimeout(function() {
          // Font warm-up div'ini kaldır
          var wu = document.getElementById('font-warmup');
          if (wu) wu.remove();
          document.getElementById('loading-screen').classList.add('hidden');
          document.getElementById('game-container').classList.add('active');
        }, 300);  
      };
      g.onerror = function() {
        ltxt.textContent = 'HATA: main.js yüklenemedi';
        ltxt.style.color = '#ff4444';
      }; 
      document.body.appendChild(g);
    };
    ph.onerror = function() {
      ltxt.textContent = 'HATA: Phaser yüklenemedi';
      ltxt.style.color = '#ff4444';
    };
    document.body.appendChild(ph);
  });
</script>
</body>
</html>
